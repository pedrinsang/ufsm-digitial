<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - UFSM Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-app: #001f24; /* Fundo petróleo padrão */
            --bg-card: #303030; /* Cinza do card */
            --input-bg: #1e1e1e; /* Fundo do campo de texto */
            --primary: #cce8f8; /* Azul claro (mesmo do botão da carteira) */
            --primary-text: #003b5c;
        }
        
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-app);
            color: white;
        }

        /* Filtro para o brasão ficar branco */
        .filter-white { filter: brightness(0) invert(1); }
        
        /* Remove o fundo amarelo/azul do autocomplete do navegador */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px var(--input-bg) inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-6 relative">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none opacity-20">
        <div class="absolute -top-20 -right-20 w-64 h-64 rounded-full bg-[#004b6b] blur-3xl"></div>
        <div class="absolute bottom-10 -left-20 w-48 h-48 rounded-full bg-[#004b6b] blur-3xl"></div>
    </div>

    <div class="flex flex-col items-center mb-10">
        <img src="assets/images/Logo-UFSM-branco.png" class="w-20 h-24 object-contain filter-white mb-4" alt="Brasão UFSM">
        <h1 class="text-3xl font-light tracking-wide mb-1">UFSM Digital</h1>
        <p class="text-[#b0b0b0] text-sm font-normal">Portal do Estudante</p>
    </div>

    <div class="bg-[#303030] w-full max-w-sm rounded-2xl p-6 shadow-2xl border border-white/5">
        
        <form id="login-form" class="space-y-5" onsubmit="fazerLogin(event)">
            
            <div class="space-y-1.5">
                <label for="matricula" class="block text-[13px] font-medium text-[#c4c7c5] pl-1">Matrícula</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-[#808080] text-sm"></i>
                    </div>
                    <input type="number" id="matricula" required placeholder="Ex: 202320652"
                           class="w-full bg-[#1e1e1e] border border-transparent focus:border-[#cce8f8] rounded-xl py-3 pl-10 pr-4 text-white text-[15px] outline-none transition-all placeholder-[#606060]">
                </div>
            </div>

            <div class="space-y-1.5">
                <label for="senha" class="block text-[13px] font-medium text-[#c4c7c5] pl-1">Senha</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-[#808080] text-sm"></i>
                    </div>
                    <input type="password" id="senha" required placeholder="Sua senha do portal"
                           class="w-full bg-[#1e1e1e] border border-transparent focus:border-[#cce8f8] rounded-xl py-3 pl-10 pr-10 text-white text-[15px] outline-none transition-all placeholder-[#606060]">
                    
                    <button type="button" onclick="toggleSenha()" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-[#808080] hover:text-white transition-colors">
                        <i class="fa-solid fa-eye" id="icone-senha"></i>
                    </button>
                </div>
            </div>

            <div class="flex justify-end pt-1">
                <a href="#" class="text-[13px] text-[#cce8f8] hover:underline">Esqueceu a senha?</a>
            </div>

            <button type="submit" 
                    class="w-full bg-[#cce8f8] text-[#003b5c] font-bold text-[16px] rounded-xl py-3.5 mt-2 shadow-lg active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
                Entrar <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
    </div>

    <div class="mt-12 text-center text-[#808080] text-[12px]">
        <p>Desenvolvido para uso exclusivo de alunos</p>
        <p class="mt-1">e servidores da instituição.</p>
    </div>

    <script>
        // Função para mostrar/esconder a senha
        function toggleSenha() {
            const campoSenha = document.getElementById('senha');
            const icone = document.getElementById('icone-senha');
            
            if (campoSenha.type === 'password') {
                campoSenha.type = 'text';
                icone.classList.remove('fa-eye');
                icone.classList.add('fa-eye-slash');
            } else {
                campoSenha.type = 'password';
                icone.classList.remove('fa-eye-slash');
                icone.classList.add('fa-eye');
            }
        }

        // Simulação de Login
        function fazerLogin(event) {
            // Previne que a página recarregue ao enviar o formulário
            event.preventDefault();
            
            // Pega a matrícula digitada
            const matricula = document.getElementById('matricula').value;
            
            // OPCIONAL: Salva a matrícula no LocalStorage para usar na carteirinha depois
            localStorage.setItem('matriculaUsuario', matricula);
            
            // Efeito visual no botão
            const btn = event.target.querySelector('button[type="submit"]');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Autenticando...';
            btn.classList.add('opacity-80');

            // Simula um tempo de carregamento de rede (1.5 segundos) antes de redirecionar
            setTimeout(() => {
                // REDIRECIONA PARA A TELA PRINCIPAL (que agora se chama home.html)
                window.location.href = 'home.html';
            }, 1500);
        }
    </script>
</body>
</html>
