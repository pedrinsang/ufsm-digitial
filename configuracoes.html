<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configuração da Conta - UFSM Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-app: #001f24;
            --bg-card: #303030;
            --bg-input: #1e1e1e;
            --primary: #cce8f8;
            --primary-text: #003b5c;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background:
                radial-gradient(circle at top right, rgba(0, 91, 130, 0.22), transparent 28%),
                radial-gradient(circle at bottom left, rgba(204, 232, 248, 0.08), transparent 24%),
                var(--bg-app);
            color: white;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .camera-shell {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0)),
                #111827;
        }
    </style>
</head>
<body class="min-h-screen pb-8">
    <header class="sticky top-0 z-30 bg-[#001f24]/95 backdrop-blur px-4 h-14 flex items-center justify-between border-b border-white/10">
        <button onclick="window.location.href='home.html'" class="w-10 h-10 rounded-full flex items-center justify-center text-white active:bg-white/10 transition-colors" aria-label="Voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h1 class="text-[18px] font-medium">Configuração da Conta</h1>
        <button onclick="window.location.href='carteira.html'" class="w-10 h-10 rounded-full flex items-center justify-center text-white active:bg-white/10 transition-colors" aria-label="Abrir carteira">
            <i class="fa-regular fa-id-card"></i>
        </button>
    </header>

    <main class="px-4 pt-5 space-y-4">
        <section class="bg-[var(--bg-card)] rounded-3xl p-5 shadow-2xl border border-white/5">
            <div class="flex flex-col items-center text-center">
                <div class="relative">
                    <img id="foto-preview" src="https://via.placeholder.com/160x160" class="w-28 h-28 rounded-full object-cover border-4 border-white/10 shadow-lg" alt="Foto do perfil">
                    <div class="absolute -bottom-1 -right-1 w-9 h-9 rounded-full bg-[var(--primary)] text-[var(--primary-text)] flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                </div>

                <h2 class="mt-4 text-xl font-medium">Sua conta UFSM</h2>
                <p class="mt-1 text-sm text-[#b8c4c8]">Atualize seus dados e escolha uma foto pela câmera ou pelos arquivos do dispositivo.</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-5">
                <button type="button" onclick="abrirCamera()" class="w-full rounded-2xl bg-[var(--primary)] text-[var(--primary-text)] font-bold py-3 px-4 active:scale-[0.99] transition-transform flex items-center justify-center gap-2">
                    <i class="fa-solid fa-camera-retro"></i>
                    Tirar foto
                </button>
                <button type="button" onclick="document.getElementById('input-arquivo-foto').click()" class="w-full rounded-2xl bg-white/5 border border-white/10 text-white font-medium py-3 px-4 active:scale-[0.99] transition-transform flex items-center justify-center gap-2">
                    <i class="fa-regular fa-image"></i>
                    Escolher dos arquivos
                </button>
            </div>

            <input id="input-arquivo-foto" type="file" class="hidden" accept="image/*" onchange="selecionarFotoArquivo(event)">
        </section>

        <section class="bg-[var(--bg-card)] rounded-3xl p-5 shadow-2xl border border-white/5">
            <form id="form-conta" class="space-y-4">
                <div>
                    <label for="nome" class="block text-[13px] font-medium text-[#c4c7c5] mb-1.5">Nome completo</label>
                    <input id="nome" type="text" required maxlength="80" class="w-full bg-[var(--bg-input)] rounded-2xl px-4 py-3 border border-transparent focus:border-[var(--primary)] outline-none transition-all text-white" placeholder="Seu nome completo">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="data-nascimento" class="block text-[13px] font-medium text-[#c4c7c5] mb-1.5">Data de nascimento</label>
                        <input id="data-nascimento" type="date" required class="w-full bg-[var(--bg-input)] rounded-2xl px-4 py-3 border border-transparent focus:border-[var(--primary)] outline-none transition-all text-white">
                    </div>
                    <div>
                        <label for="matricula" class="block text-[13px] font-medium text-[#c4c7c5] mb-1.5">Matrícula</label>
                        <input id="matricula" type="text" inputmode="numeric" required maxlength="12" class="w-full bg-[var(--bg-input)] rounded-2xl px-4 py-3 border border-transparent focus:border-[var(--primary)] outline-none transition-all text-white" placeholder="Ex: 202320652">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="cpf" class="block text-[13px] font-medium text-[#c4c7c5] mb-1.5">CPF</label>
                        <input id="cpf" type="text" inputmode="numeric" required maxlength="14" class="w-full bg-[var(--bg-input)] rounded-2xl px-4 py-3 border border-transparent focus:border-[var(--primary)] outline-none transition-all text-white" placeholder="000.000.000-00">
                    </div>
                    <div>
                        <label for="rg" class="block text-[13px] font-medium text-[#c4c7c5] mb-1.5">RG</label>
                        <input id="rg" type="text" required maxlength="20" class="w-full bg-[var(--bg-input)] rounded-2xl px-4 py-3 border border-transparent focus:border-[var(--primary)] outline-none transition-all text-white" placeholder="Seu RG">
                    </div>
                </div>

                <div id="mensagem-sucesso" class="hidden rounded-2xl bg-emerald-500/15 border border-emerald-400/20 text-emerald-200 px-4 py-3 text-sm">
                    Dados atualizados com sucesso.
                </div>

                <button type="submit" class="w-full rounded-2xl bg-[var(--primary)] text-[var(--primary-text)] font-bold py-3.5 px-4 active:scale-[0.99] transition-transform flex items-center justify-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar alterações
                </button>
            </form>
        </section>
    </main>

    <div id="camera-modal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm px-4 py-6">
        <div class="max-w-md mx-auto h-full flex items-center justify-center">
            <div class="w-full bg-[#0f172a] rounded-[28px] border border-white/10 shadow-2xl overflow-hidden">
                <div class="flex items-center justify-between px-5 py-4 border-b border-white/10">
                    <div>
                        <h3 class="text-lg font-medium text-white">Capturar foto</h3>
                        <p class="text-sm text-slate-300">Posicione o rosto e salve quando a imagem estiver boa.</p>
                    </div>
                    <button type="button" onclick="fecharCamera()" class="w-10 h-10 rounded-full text-white active:bg-white/10 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="p-5 space-y-4">
                    <div class="camera-shell relative rounded-[24px] overflow-hidden aspect-square border border-white/10 flex items-center justify-center">
                        <video id="camera-video" autoplay playsinline class="w-full h-full object-cover"></video>
                        <img id="camera-foto-capturada" class="hidden w-full h-full object-cover" alt="Foto capturada">
                        <div class="absolute inset-0 border-[10px] border-white/5 rounded-[24px] pointer-events-none"></div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <button type="button" id="botao-capturar" onclick="capturarFoto()" class="rounded-2xl bg-[var(--primary)] text-[var(--primary-text)] font-bold py-3 px-4">
                            Capturar
                        </button>
                        <button type="button" id="botao-refazer" onclick="refazerCaptura()" class="hidden rounded-2xl bg-white/5 border border-white/10 text-white font-medium py-3 px-4">
                            Refazer
                        </button>
                        <button type="button" id="botao-usar-foto" onclick="usarFotoCapturada()" class="hidden rounded-2xl bg-emerald-500 text-white font-bold py-3 px-4">
                            Usar foto
                        </button>
                    </div>

                    <p id="camera-erro" class="hidden text-sm text-red-300 bg-red-500/10 border border-red-400/20 rounded-2xl px-4 py-3"></p>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas-captura" class="hidden"></canvas>

    <script src="assets/js/conta.js"></script>
    <script>
        let streamCamera = null;
        let fotoCapturada = '';
        let fotoAtual = '';

        function preencherFormulario() {
            const conta = UFSMDigitalConta.ensure();
            fotoAtual = conta.foto || '';

            document.getElementById('nome').value = conta.nome;
            document.getElementById('data-nascimento').value = conta.dataNascimento;
            document.getElementById('cpf').value = UFSMDigitalConta.formatCPF(conta.cpf);
            document.getElementById('rg').value = conta.rg;
            document.getElementById('matricula').value = conta.matricula;

            if (fotoAtual) {
                document.getElementById('foto-preview').src = fotoAtual;
            }
        }

        function mostrarMensagemSalva() {
            const mensagem = document.getElementById('mensagem-sucesso');
            mensagem.classList.remove('hidden');

            clearTimeout(mostrarMensagemSalva.timeoutId);
            mostrarMensagemSalva.timeoutId = setTimeout(() => {
                mensagem.classList.add('hidden');
            }, 3000);
        }

        async function abrirCamera() {
            const modal = document.getElementById('camera-modal');
            const erro = document.getElementById('camera-erro');

            erro.classList.add('hidden');
            erro.textContent = '';
            fotoCapturada = '';

            document.getElementById('camera-video').classList.remove('hidden');
            document.getElementById('camera-foto-capturada').classList.add('hidden');
            document.getElementById('botao-capturar').classList.remove('hidden');
            document.getElementById('botao-refazer').classList.add('hidden');
            document.getElementById('botao-usar-foto').classList.add('hidden');

            modal.classList.remove('hidden');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                erro.textContent = 'A câmera não está disponível neste navegador ou dispositivo.';
                erro.classList.remove('hidden');
                return;
            }

            try {
                streamCamera = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1080 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });

                document.getElementById('camera-video').srcObject = streamCamera;
            } catch (error) {
                erro.textContent = 'Não foi possível acessar a câmera. Verifique a permissão e tente novamente.';
                erro.classList.remove('hidden');
            }
        }

        function fecharCamera() {
            const modal = document.getElementById('camera-modal');
            modal.classList.add('hidden');
            pararCamera();
            restaurarModoCaptura();
        }

        function pararCamera() {
            if (streamCamera) {
                streamCamera.getTracks().forEach((track) => track.stop());
                streamCamera = null;
            }
        }

        function restaurarModoCaptura() {
            fotoCapturada = '';
            document.getElementById('camera-video').classList.remove('hidden');
            document.getElementById('camera-foto-capturada').classList.add('hidden');
            document.getElementById('botao-capturar').classList.remove('hidden');
            document.getElementById('botao-refazer').classList.add('hidden');
            document.getElementById('botao-usar-foto').classList.add('hidden');
        }

        function capturarFoto() {
            const video = document.getElementById('camera-video');

            if (!video.videoWidth || !video.videoHeight) {
                return;
            }

            const canvas = document.getElementById('canvas-captura');
            const contexto = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            contexto.drawImage(video, 0, 0, canvas.width, canvas.height);

            fotoCapturada = canvas.toDataURL('image/jpeg', 0.92);

            document.getElementById('camera-foto-capturada').src = fotoCapturada;
            document.getElementById('camera-video').classList.add('hidden');
            document.getElementById('camera-foto-capturada').classList.remove('hidden');
            document.getElementById('botao-capturar').classList.add('hidden');
            document.getElementById('botao-refazer').classList.remove('hidden');
            document.getElementById('botao-usar-foto').classList.remove('hidden');

            pararCamera();
        }

        async function refazerCaptura() {
            restaurarModoCaptura();

            if (document.getElementById('camera-modal').classList.contains('hidden')) {
                return;
            }

            await abrirCamera();
        }

        function usarFotoCapturada() {
            if (!fotoCapturada) {
                return;
            }

            fotoAtual = fotoCapturada;
            document.getElementById('foto-preview').src = fotoAtual;
            fecharCamera();
        }

        function selecionarFotoArquivo(event) {
            const arquivo = event.target.files[0];

            if (!arquivo) {
                return;
            }

            const leitor = new FileReader();
            leitor.onload = function (e) {
                fotoAtual = e.target.result;
                document.getElementById('foto-preview').src = fotoAtual;
            };
            leitor.readAsDataURL(arquivo);
        }

        function aplicarMascaraCPF(event) {
            event.target.value = UFSMDigitalConta.formatCPF(event.target.value);
        }

        function aplicarMascaraMatricula(event) {
            event.target.value = UFSMDigitalConta.digitsOnly(event.target.value).slice(0, 12);
        }

        function salvarConta(event) {
            event.preventDefault();

            const dados = {
                nome: document.getElementById('nome').value.trim(),
                dataNascimento: document.getElementById('data-nascimento').value,
                cpf: UFSMDigitalConta.digitsOnly(document.getElementById('cpf').value),
                rg: document.getElementById('rg').value.trim(),
                matricula: UFSMDigitalConta.digitsOnly(document.getElementById('matricula').value),
                foto: fotoAtual
            };

            const camposObrigatorios = [dados.nome, dados.dataNascimento, dados.cpf, dados.rg, dados.matricula];
            if (camposObrigatorios.some((valor) => !valor)) {
                return;
            }

            if (dados.cpf.length !== 11) {
                alert('Informe um CPF com 11 dígitos.');
                return;
            }

            UFSMDigitalConta.saveData(dados);
            mostrarMensagemSalva();
        }

        document.addEventListener('DOMContentLoaded', () => {
            preencherFormulario();

            document.getElementById('cpf').addEventListener('input', aplicarMascaraCPF);
            document.getElementById('matricula').addEventListener('input', aplicarMascaraMatricula);
            document.getElementById('form-conta').addEventListener('submit', salvarConta);
        });

        window.addEventListener('beforeunload', pararCamera);
    </script>
</body>
</html>
