<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFSM Digital</title>
    <meta name="theme-color" content="#001f24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UFSM Digital">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
    <link rel="icon" href="assets/images/icon-192.png">
    <meta http-equiv="refresh" content="0; url=home.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background:
                radial-gradient(circle at top right, rgba(0, 91, 130, 0.28), transparent 28%),
                radial-gradient(circle at bottom left, rgba(204, 232, 248, 0.1), transparent 24%),
                #001f24;
            color: white;
        }

        .filter-white { filter: brightness(0) invert(1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
    <main class="w-full max-w-sm text-center">
        <div class="bg-white/5 border border-white/10 rounded-3xl px-6 py-10 shadow-2xl backdrop-blur-sm">
            <img src="assets/images/Logo-UFSM-branco.png" class="w-20 h-24 object-contain filter-white mx-auto mb-5" alt="Brasão UFSM">
            <h1 class="text-3xl font-light tracking-wide">UFSM Digital</h1>
            <p class="mt-2 text-sm text-[#c7d2d6]">Abrindo o portal do estudante...</p>

            <div class="mt-6 flex justify-center">
                <div class="w-8 h-8 rounded-full border-4 border-white/20 border-t-[#cce8f8] animate-spin"></div>
            </div>

            <p class="mt-6 text-xs text-[#8ea3ac]">
                Se o redirecionamento não acontecer,
                <a href="home.html" class="text-[#cce8f8] underline underline-offset-2">toque aqui</a>.
            </p>
        </div>
    </main>

    <script src="assets/js/pwa.js"></script>
    <script>
        window.location.replace('home.html');
    </script>
</body>
</html>
